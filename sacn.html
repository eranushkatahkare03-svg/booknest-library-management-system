<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Scanner</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to top, #708f96, #ffffff);
        height: 100vh;
      }
      .scanner-container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 350px;
      }
      .scanner-container h2 {
        color: #333;
      }
      .scan-box {
        width: 100%;
        height: 300px; /* Adjust based on your scanning box */
        background: #e2e8f0;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 20px 0;
      }
      .scan-box p {
        color: #666;
      }
      .scan-result {
        font-size: 16px;
        color: #2c3e50;
        margin-top: 10px;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 16px;
        border-radius: 5px;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="scanner-container">
      <h2>QR Code Scanner</h2>
      <div class="scan-box">
        <p>Scan your QR code here</p>
      </div>
      <p class="scan-result">Scanned ID: <span id="qrResult">None</span></p>
      <button>Start Scanning</button>
    </div>
  </body>
</html>
