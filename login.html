<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login and Registration Page</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  
  <body>
    
    <div class="container">
      <!-- Login Form -->
      <!-- Updated Login Form -->
      <div id="login-box" class="form-box">
        <h2>Login</h2>
        <form id="login-form" action="login.php" method="post">
      
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />

          <button type="submit" id="loginButton">Login</button>
          <p class="toggle-link">
            Don't have an account? <a href="#" id="signup-link">Sign Up</a>
          </p>
        </form>
      </div>

      <!-- Registration Form -->
      <div id="signup-box" class="form-box hidden">
        <h2>Sign Up</h2>
        <form id="signup-form" action="r.php" method="post">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required />

          <label for="enrollment">Enrollment No.</label>
          <input type="text" id="enrollment" name="enrollment" required />

          <label for="library_number">Library No.</label>
          <input type="text" id="lib_no" name="lib_no" required />

          <label for="email">Email ID</label>
          <input type="email" id="email" name="email" required />

          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required />

          <label for="department">Department</label>
          <input type="text" id="department" name="department" required />

          <label for="p1">Password</label>
          <input type="password" id="p1" name="p1" required/>

          <button type="submit" id="registerBtn">Register</button>

          <p class="toggle-link">
            Already have an account? <a href="#" id="login-link">Login</a>
          </p>
        </form>
      </div>
    </div>
   <script src="script.js"></script>
   
  </body>
</html>
